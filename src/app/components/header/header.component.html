<header
  class="app-header"
  [class.app-header--search]="showSearchPanel"
  [class.app-header--mobile]="isMobile"
>
  <div class="app-header__bar">
    <button
      type="button"
      class="app-header__btn app-header__btn--menu"
      aria-label="Меню"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 6h18v2H3V6Zm0 5h18v2H3v-2Zm0 5h18v2H3v-2Z" />
      </svg>
    </button>

    <div class="app-header__desktop">
      <div class="app-header__logo"></div>

      <div class="app-header__slot">
        <app-nav-links
          class="app-header__nav"
          [class.app-header__nav--ghost]="showSearchPanel && !isMobile"
          [attr.aria-hidden]="showSearchPanel && !isMobile"
          [items]="navItems"
          [activeId]="activeNavId"
          (itemClick)="activeNavId = $event"
        />

        @if (showSearchPanel && !isMobile) {
          <app-search-panel
            class="app-header__search"
            [query]="searchQuery"
            [history]="history"
            [filters]="filters"
            [closing]="isSearchClosing"
            [mobile]="false"
            (queryChange)="searchQuery = $event"
            (filtersChange)="onFiltersChange($event)"
            (historySelect)="onHistorySelect($event)"
            (submitSearch)="onSubmitSearch($event)"
            (close)="closeSearch()"
            (closeAnimationDone)="onSearchCloseAnimationDone()"
          />
        }
      </div>

      <div class="app-header__tools">
        @if (!showSearchPanel) {
          <button
            type="button"
            class="app-header__btn"
            aria-label="Поиск"
            (click)="openSearch()"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5Zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14Z"
              />
            </svg>
          </button>
        }

        <button type="button" class="app-header__btn" aria-label="Добавить">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M12 24C18.6274 24 24 18.6274 24 12C24 5.37258 18.6274 0 12 0C5.37256 0 0 5.37258 0 12C0 18.6274 5.37256 24 12 24ZM13 13H19V11H13V5H11V11H5V13H11V19H13V13Z"
            />
          </svg>
        </button>
      </div>

      <div class="app-header__aside">
        <button
          type="button"
          class="app-header__btn app-header__btn--notify"
          aria-label="Уведомления"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 22C13.1 22 14 21.1 14 20H10C10 21.1 10.9 22 12 22ZM18 16V11C18 7.93 16.37 5.36 13.5 4.68V4C13.5 3.17 12.83 2.5 12 2.5C11.17 2.5 10.5 3.17 10.5 4V4.68C7.64 5.36 6 7.92 6 11V16L4 18V19H20V18L18 16ZM16 17H8V11C8 8.52 9.51 6.5 12 6.5C14.49 6.5 16 8.52 16 11V17Z"
            />
          </svg>
          <span class="app-header__badge">{{ notificationCount }}</span>
        </button>
      </div>
    </div>

    <div class="app-header__mobile-actions">
      <button type="button" class="app-header__btn" aria-label="Добавить">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M12 24C18.6274 24 24 18.6274 24 12C24 5.37258 18.6274 0 12 0C5.37256 0 0 5.37258 0 12C0 18.6274 5.37256 24 12 24ZM13 13H19V11H13V5H11V11H5V13H11V19H13V13Z"
          />
        </svg>
      </button>

      <button type="button" class="app-header__btn" aria-label="История">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M13 3C8.03 3 4 7.03 4 12H1L4.89 15.89L4.96 16.03L9 12H6C6 8.13 9.13 5 13 5C16.87 5 20 8.13 20 12C20 15.87 16.87 19 13 19C11.07 19 9.32 18.21 8.06 16.94L6.64 18.36C8.27 19.99 10.51 21 13 21C17.97 21 22 16.97 22 12C22 7.03 17.97 3 13 3ZM12 8V13L16.25 15.52L17.02 14.24L13.5 12.15V8H12Z"
          />
        </svg>
      </button>

      <button
        type="button"
        class="app-header__btn"
        aria-label="Поиск"
        (click)="openSearch()"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5Zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14Z"
          />
        </svg>
      </button>

      <button
        type="button"
        class="app-header__btn"
        aria-label="Уведомления"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 22C13.1 22 14 21.1 14 20H10C10 21.1 10.9 22 12 22ZM18 16V11C18 7.93 16.37 5.36 13.5 4.68V4C13.5 3.17 12.83 2.5 12 2.5C11.17 2.5 10.5 3.17 10.5 4V4.68C7.64 5.36 6 7.92 6 11V16L4 18V19H20V18L18 16ZM16 17H8V11C8 8.52 9.51 6.5 12 6.5C14.49 6.5 16 8.52 16 11V17Z"
          />
        </svg>
      </button>
    </div>
  </div>

  @if (showSearchPanel && isMobile) {
    <app-search-panel
      class="app-header__mobile-search"
      [query]="searchQuery"
      [history]="history"
      [filters]="filters"
      [closing]="isSearchClosing"
      [mobile]="true"
      (queryChange)="searchQuery = $event"
      (filtersChange)="onFiltersChange($event)"
      (historySelect)="onHistorySelect($event)"
      (submitSearch)="onSubmitSearch($event)"
      (close)="closeSearch()"
      (closeAnimationDone)="onSearchCloseAnimationDone()"
    />
  }
</header>
