<nav class="nav-links" aria-label="Основная навигация">
  @for (item of items; track item.id) {
    <a
      class="nav-links__item"
      href="#"
      [class.nav-links__item--active]="item.id === activeId"
      (click)="$event.preventDefault(); itemClick.emit(item.id)"
    >
      <span class="nav-links__icon" aria-hidden="true">
        @switch (item.icon) {
          @case ('links') {
            <svg viewBox="0 0 24 24">
              <path
                d="M3.9 12a5 5 0 0 1 5-5h4v2h-4a3 3 0 0 0 0 6h4v2h-4a5 5 0 0 1-5-5Zm7-1h6v2h-6v-2Zm4.1-4h4a5 5 0 0 1 0 10h-4v-2h4a3 3 0 0 0 0-6h-4V7Z"
              />
            </svg>
          }
          @case ('contacts') {
            <svg viewBox="0 0 24 24">
              <path
                d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3Zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3Zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13Zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5Z"
              />
            </svg>
          }
          @case ('tags') {
            <svg viewBox="0 0 24 24">
              <path
                d="M20 10V8h-4V4h-2v4h-4V4H8v4H4v2h4v4H4v2h4v4h2v-4h4v4h2v-4h4v-2h-4v-4h4Zm-6 4h-4v-4h4v4Z"
              />
            </svg>
          }
          @case ('favorites') {
            <svg viewBox="0 0 24 24">
              <path
                d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27Z"
              />
            </svg>
          }
          @case ('visits') {
            <svg viewBox="0 0 24 24">
              <path
                d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6a7 7 0 0 1 7-7 7 7 0 0 1 7 7 7 7 0 0 1-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.95 8.95 0 0 0 13 21a9 9 0 0 0 0-18Zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12Z"
              />
            </svg>
          }
        }
      </span>
      <span class="nav-links__label">{{ item.label }}</span>
    </a>
  }
</nav>
