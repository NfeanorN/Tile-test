<div class="search-panel" [class.search-panel--mobile]="mobile()">
  <div class="search-panel__top">
    @if (mobile()) {
      <button
        type="button"
        class="search-panel__back"
        aria-label="Назад"
        (click)="close.emit()"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2Z" />
        </svg>
      </button>
    }

    <div class="search-panel__field">
      <form class="search-panel__form" (submit)="onSubmit($event)">
        <input
          #searchInput
          class="search-panel__input"
          type="search"
          name="query"
          [placeholder]="mobile() ? 'Поиск' : 'Поисковый запрос'"
          autocomplete="off"
          [ngModel]="query()"
          (ngModelChange)="queryChange.emit($event)"
        />
      </form>
    </div>
  </div>

  @if (dropdownOpen()) {
    <div class="search-panel__dropdown" role="dialog" aria-label="Параметры поиска">
      <div class="search-panel__dropdown-grid">
        @if (!mobile()) {
          <div class="search-panel__history">
            <app-search-history [items]="history()" (select)="onHistorySelect($event)" />
          </div>
        }
        <div class="search-panel__filters">
          <app-search-filters
            [filters]="filters()"
            [mobile]="mobile()"
            (filtersChange)="filtersChange.emit($event)"
          />
        </div>
      </div>
    </div>
  }
</div>
