<div class="search-filters">
  <label class="search-filters__author">
    <span class="search-filters__author-label">Автор</span>
    <input
      class="search-filters__author-input"
      type="text"
      placeholder="Имя или должность"
      [ngModel]="filters.author"
      (ngModelChange)="onAuthorChange($event)"
    />
    <button
      type="button"
      class="search-filters__me"
      title="Я"
      aria-label="Подставить себя как автора"
      (click)="setMeAsAuthor()"
    >
      Я
    </button>
  </label>

  <div class="search-filters__row search-filters__row--main">
    <label class="search-filters__check search-filters__check--participant">
      <input
        type="checkbox"
        [checked]="filters.iAmParticipant"
        (change)="toggle('iAmParticipant')"
      />
      <span class="search-filters__mark" aria-hidden="true">
        <svg viewBox="0 0 18 14" fill="none">
          <path
            d="M5.6 10.95 1.55 6.9.1 8.35l5.5 5.5 12-12L16.15.4 5.6 10.95Z"
            fill="currentColor"
          />
        </svg>
      </span>
      <span class="search-filters__label">Я участник</span>
    </label>
    <label class="search-filters__check search-filters__check--titles">
      <input type="checkbox" [checked]="filters.inTitles" (change)="toggle('inTitles')" />
      <span class="search-filters__mark" aria-hidden="true">
        <svg viewBox="0 0 18 14" fill="none">
          <path
            d="M5.6 10.95 1.55 6.9.1 8.35l5.5 5.5 12-12L16.15.4 5.6 10.95Z"
            fill="currentColor"
          />
        </svg>
      </span>
      <span class="search-filters__label">В заголовках</span>
    </label>
    <label class="search-filters__check search-filters__check--strict">
      <input
        type="checkbox"
        [checked]="filters.strictSearch"
        (change)="toggle('strictSearch')"
      />
      <span class="search-filters__mark" aria-hidden="true">
        <svg viewBox="0 0 18 14" fill="none">
          <path
            d="M5.6 10.95 1.55 6.9.1 8.35l5.5 5.5 12-12L16.15.4 5.6 10.95Z"
            fill="currentColor"
          />
        </svg>
      </span>
      <span class="search-filters__label">Строгий поиск</span>
    </label>
  </div>

  <div class="search-filters__only">
    <p class="search-filters__only-title">Только</p>
    <div class="search-filters__row">
      <label class="search-filters__check">
        <input type="checkbox" [checked]="filters.onlyTags" (change)="toggle('onlyTags')" />
        <span class="search-filters__mark" aria-hidden="true">
          <svg viewBox="0 0 18 14" fill="none">
            <path
              d="M5.6 10.95 1.55 6.9.1 8.35l5.5 5.5 12-12L16.15.4 5.6 10.95Z"
              fill="currentColor"
            />
          </svg>
        </span>
        <span class="search-filters__label">Теги</span>
      </label>
      <label class="search-filters__check">
        <input
          type="checkbox"
          [checked]="filters.onlyRequests"
          (change)="toggle('onlyRequests')"
        />
        <span class="search-filters__mark" aria-hidden="true">
          <svg viewBox="0 0 18 14" fill="none">
            <path
              d="M5.6 10.95 1.55 6.9.1 8.35l5.5 5.5 12-12L16.15.4 5.6 10.95Z"
              fill="currentColor"
            />
          </svg>
        </span>
        <span class="search-filters__label">Просьбы</span>
      </label>
      <label class="search-filters__check">
        <input
          type="checkbox"
          [checked]="filters.onlyContacts"
          (change)="toggle('onlyContacts')"
        />
        <span class="search-filters__mark" aria-hidden="true">
          <svg viewBox="0 0 18 14" fill="none">
            <path
              d="M5.6 10.95 1.55 6.9.1 8.35l5.5 5.5 12-12L16.15.4 5.6 10.95Z"
              fill="currentColor"
            />
          </svg>
        </span>
        <span class="search-filters__label">Контакты</span>
      </label>
    </div>
  </div>
</div>
